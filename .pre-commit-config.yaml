# Pre-commit hooks configuration
# Docs: https://pre-commit.com/

repos:
  # Ruff - Python linter (just error checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]  # Auto-fix simple issues like unused imports

  # Local hooks (custom scripts)
  - repo: local
    hooks:
      - id: embed-env-in-readme
        name: Embed secrets/.env.example in README
        entry: python scripts/embed_env_in_readme.py
        language: system
        files: '^(secrets/\.env\.example|README\.md)$'
        pass_filenames: false
        stages: [pre-commit]
